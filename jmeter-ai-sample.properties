jmeter.ai.streaming.enabled=true
# Feather Wand - JMeter AI Plugin Configuration
##### CORRELATION / DYNAMIC VALUE DETECTION PATTERNS #####
# Customize the regex patterns and word lists used by the DynamicValueDetector.
# If a property is not defined or contains an invalid regex, the built-in default is used.
# Note: backslashes in regex patterns must be doubled (e.g. \\s for the regex \s).
# UUID pattern
jmeter.ai.correlation.pattern.uuid=[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}
# JWT (JSON Web Token) pattern
jmeter.ai.correlation.pattern.jwt=[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}
# Base64 encoded value pattern
jmeter.ai.correlation.pattern.base64=[A-Za-z0-9+/]{20,}={0,2}
# Long hexadecimal string pattern
jmeter.ai.correlation.pattern.hex=[0-9a-fA-F]{16,}
# Known token name pattern (matches JSESSIONID, csrf, access_token, etc.)
jmeter.ai.correlation.pattern.known_token=(?i)(JSESSIONID|jsessionid|sessionId|_sourcePage|__fp|_token|csrf|access_token|id_token|code|state|nonce)[\\\\"'\\s:=]+([A-Za-z0-9._~+/=-]{3,})
# Set-Cookie header pattern
jmeter.ai.correlation.pattern.set_cookie=(?i)^Set-Cookie\\s*:\\s*([^=;\\s]+)=([^;\\s]+)
# Key-value pair pattern (matches token/session/csrf related key-value pairs)
jmeter.ai.correlation.pattern.key_value=(?i)[\\\\"']?([A-Za-z0-9_.-]*(?:token|session|csrf|nonce|state|code|sourcepage|__fp)[A-Za-z0-9_.-]*)[\\\\"']?\\s*[:=]\\s*[\\\\"']?([^\\\\"'&;,<>\\s]{3,})
# Hidden HTML input pattern
jmeter.ai.correlation.pattern.hidden_input=(?i)<input\\b(?=[^>]*\\btype=[\\\\"']?hidden[\\\\"']?)(?=[^>]*\\bname=[\\\\"']([^\\\\"']+)[\\\\"'])(?=[^>]*\\bvalue=[\\\\"']([^\\\\"']*)[\\\\"'])[^>]*>
# Quoted value pattern (for entropy-based dynamic value detection)
jmeter.ai.correlation.pattern.quoted_value=[\\\\"']([A-Za-z0-9._~+/=-]{11,})[\\\\"']
# Comma-separated list of static strings to exclude from dynamic value detection
jmeter.ai.correlation.static_strings=application/json,application/xml,text/html,text/plain,en-us,true,false,null,utf-8
# Comma-separated list of dictionary words to exclude from dynamic value detection
jmeter.ai.correlation.dictionary_words=success,failure,message,status,content,application,language,response,request,cookie,header,session,token,login,logout
# Add a new "tracking_id" pattern
jmeter.ai.correlation.pattern.custom.1.name=tracking_id
jmeter.ai.correlation.pattern.custom.1.regex=TRACK-[A-Z0-9]{8}
# Add another "auth_code" pattern
jmeter.ai.correlation.pattern.custom.2.name=auth_code
jmeter.ai.correlation.pattern.custom.2.regex=AUTH-[0-9a-f]{16}
# Add as many as needed...
jmeter.ai.correlation.pattern.custom.3.name=order_ref
jmeter.ai.correlation.pattern.custom.3.regex=ORD-[0-9]{6}-[A-Z]{3}
# ─── Custom Detection Patterns ───
# Add your own regex patterns without modifying source code.
# Use consecutive indices starting at 1. Each pattern needs a name and a regex.
# The name becomes the token type in detection results.
# Invalid regex entries are skipped with a warning in the log.
#
# Example: detect a custom tracking ID like "TRACK-ABCD1234"
#jmeter.ai.correlation.pattern.custom.1.name=tracking_id
#jmeter.ai.correlation.pattern.custom.1.regex=TRACK-[A-Z0-9]{8}
#
# Example: detect an auth code like "AUTH-abcdef0123456789"
#jmeter.ai.correlation.pattern.custom.2.name=auth_code
#jmeter.ai.correlation.pattern.custom.2.regex=AUTH-[0-9a-f]{16}
