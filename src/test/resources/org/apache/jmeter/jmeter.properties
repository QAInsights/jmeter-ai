# Minimal fallback JMeter properties for headless unit tests (e.g. TestPlanRunnerTest).
# JMeterUtils.loadJMeterProperties() falls back to this classpath resource when no real
# jmeter.properties file path is given - there is no live JMeter install/JMETER_HOME during
# `mvn test`. Intentionally empty beyond this comment: only appProperties needing to be
# non-null (rather than any specific property value) is required for a headless engine run.
